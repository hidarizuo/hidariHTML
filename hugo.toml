baseURL = 'https://hidarizuo.github.io/hidariHTML/'
locale = 'zh-cn'
title = "Hidari's Blog"
theme = 'PaperMod'
defaultContentLanguage = 'zh'

[params]
  env = 'production'
  description = "左哥的技术博客"
  author = 'hidari'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  defaultTheme = 'auto'
  comments = true

  [params.homeInfoParams]
    Title = "👋 欢迎来到hidari的博客"
    Content = "这里记录技术、生活与思考。"

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/hidarizuo'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 30
