<span id="runtime" style="display:block;text-align:center;font-size:14px;color:var(--secondary);margin-top:8px"></span>
<script>
    function updateRuntime() {
        var start = new Date("2026-06-02T00:00:00+08:00");
        var now = new Date();
        var diff = Math.floor((now - start) / 1000);
        var d = Math.floor(diff / 86400);
        var h = Math.floor((diff % 86400) / 3600);
        var m = Math.floor((diff % 3600) / 60);
        var s = diff % 60;
        document.getElementById("runtime").innerHTML = "在aris的帮助下，本站稀里糊涂的已运行 " + d + " 天 " + h + " 时 " + m + " 分 " + s + " 秒";
    }
    updateRuntime();
    setInterval(updateRuntime, 1000);
</script>
