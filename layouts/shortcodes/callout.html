{{- $type := .Get "type" | default "info" -}}
{{- $title := .Get "title" | default "" -}}
<div class="callout callout-{{ $type }}" style="border-left: 4px solid {{ if eq $type "warning" }}#d4a72c{{ else if eq $type "danger" }}#cf222e{{ else }}#0969da{{ end }}; background: {{ if eq $type "warning" }}#fff8c5{{ else if eq $type "danger" }}#ffebe9{{ else }}#ddf4ff{{ end }}; padding: 12px 16px; border-radius: 4px; margin: 16px 0;">
{{- if ne $title "" -}}
<p style="margin: 0 0 6px 0; font-weight: 600; color: {{ if eq $type "warning" }}#9a6700{{ else if eq $type "danger" }}#a40e26{{ else }}#0969da{{ end }};">{{ $title }}</p>
{{- end -}}
<p style="margin: 0; color: #1f2328;">{{ .Inner }}</p>
</div>
